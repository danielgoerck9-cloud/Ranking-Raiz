<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ranking Raiz 2026</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
:root{--green:#0F6E56;--green2:#1D9E75;--gold:#D4A017;--silver:#9AA0A6;--bronze:#B0703C;--bg:#F4F2EC;--card:#fff;--ink:#1d2421;--muted:#6b726e;--line:#e3e0d6}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;background:var(--bg);color:var(--ink);line-height:1.5;padding-bottom:40px}
header{background:var(--green);color:#fff;padding:18px 16px;text-align:center}
header h1{font-size:20px;font-weight:600;letter-spacing:.3px}
header p{font-size:12px;opacity:.85;margin-top:2px}
.wrap{max-width:680px;margin:0 auto;padding:0 12px}
.tabs{display:flex;gap:6px;margin:14px 0;background:var(--card);border-radius:12px;padding:5px;border:1px solid var(--line)}
.tab{flex:1;padding:9px;border:none;background:none;font-size:13px;font-weight:600;color:var(--muted);border-radius:8px;cursor:pointer;font-family:inherit}
.tab.active{background:var(--green);color:#fff}
.card{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:14px;margin-bottom:12px}
.card h2{font-size:14px;font-weight:600;margin-bottom:10px;color:var(--green)}
label{display:block;font-size:12px;font-weight:600;color:var(--muted);margin:8px 0 4px}
select,input{width:100%;padding:10px;border:1px solid var(--line);border-radius:8px;font-size:14px;font-family:inherit;background:#fff;color:var(--ink)}
.btn{width:100%;padding:12px;border:none;border-radius:8px;background:var(--green);color:#fff;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;margin-top:12px}
.btn:active{opacity:.85}
.btn.sec{background:#fff;color:var(--green);border:1px solid var(--green)}
.btn.danger{background:#fff;color:#c0392b;border:1px solid #c0392b}
.row{display:flex;align-items:center;padding:9px 4px;border-bottom:1px solid var(--line);font-size:14px}
.row:last-child{border:none}
.pos{width:34px;font-weight:700;color:var(--muted);font-size:13px}
.pos.p1{color:var(--gold)}.pos.p2{color:var(--silver)}.pos.p3{color:var(--bronze)}
.nm{flex:1;font-weight:500}
.pts{font-weight:700;color:var(--green);font-size:15px}
.medal{font-size:13px;color:var(--muted);margin-left:6px}
.datehdr{font-size:13px;font-weight:700;color:var(--green);margin:6px 0;display:flex;justify-content:space-between;align-items:center}
.podium{font-size:13px;padding:3px 0;color:var(--ink)}
.podium b{color:var(--green)}
.small{font-size:11px;color:var(--muted)}
.del{background:none;border:none;color:#c0392b;font-size:12px;cursor:pointer;font-family:inherit}
.empty{text-align:center;color:var(--muted);font-size:13px;padding:20px}
.shareimg{background:linear-gradient(160deg,#0F6E56,#0a5a45);color:#fff;border-radius:16px;padding:24px 22px;width:380px;margin:0 auto}
.shareimg .title{font-size:22px;font-weight:700;text-align:center}
.shareimg .sub{font-size:12px;opacity:.8;text-align:center;margin-bottom:18px}
.shareimg .sr{display:flex;align-items:center;padding:8px 0;border-bottom:1px solid rgba(255,255,255,.15);font-size:15px}
.shareimg .sr:last-child{border:none}
.shareimg .sp{width:30px;font-weight:700;font-size:14px}
.shareimg .sn{flex:1}
.shareimg .spt{font-weight:700}
.shareimg .foot{text-align:center;font-size:10px;opacity:.6;margin-top:16px}
.medalemoji{margin-left:4px}
</style>
</head>
<body>
<header><h1>🏌️ Ranking Raiz 2026</h1><p>Campeonato de finais de semana</p></header>
<div class="wrap">
  <div class="tabs">
    <button class="tab active" data-t="rank">Ranking</button>
    <button class="tab" data-t="add">Lançar</button>
    <button class="tab" data-t="hist">Histórico</button>
    <button class="tab" data-t="share">Compartilhar</button>
  </div>
  <div id="view"></div>
</div>

<script>
const SEED={"players": ["Luis Fernando", "Lauro Goerck", "Robson Tvardoski", "Julio Losekann", "Jeferson Hermes", "Elio Schwengber", "Ilton Schwengber", "Daniel Goerck", "Silvio Reis", "Vicente Caliari", "Cassiano Borges", "Pedro Eidt", "Michael Mcinnes", "Newton Bastos", "Cicero Caliari", "Lucas Goerck", "Paulo Schmidt", "Vicente Halmenschlager", "Antonio Rocha", "Ari Schlesener", "Carlos Mahler", "Cezar Hermes", "Demetrius Silva", "Felipe Lago", "Fernando Ferrugem", "Henrique Lersch", "Jairo Vieira", "Jorge Waechter", "Jose Silveira", "Julio Artus", "Lucas Roos", "Luiz Kaercher", "Marcelo Reis", "Marciano Fengles", "Marco Heck", "Mariano Moraes", "Miguel Goerck", "Nédio Cuppini", "Rafael Leonhardt", "Silvio Kothe", "Tiago Spat", "Ubiratan", "Vitor Trevisan", "Walter Iserhard"], "results": [{"date": "2026-01-24", "first": "Robson Tvardoski", "second": "Julio Losekann", "third": "Vicente Caliari"}, {"date": "2026-01-31", "first": "Julio Losekann", "second": "Robson Tvardoski", "third": "Pedro Eidt"}, {"date": "2026-02-14", "first": "Luis Fernando", "second": "Silvio Reis", "third": "Paulo Schmidt"}, {"date": "2026-03-21", "first": "Lauro Goerck", "second": "Silvio Reis", "third": "Luis Fernando"}, {"date": "2026-04-04", "first": "Michael Mcinnes", "second": "Vicente Caliari", "third": "Vicente Halmenschlager"}, {"date": "2026-04-18", "first": "Elio Schwengber", "second": "Luis Fernando", "third": "Ilton Schwengber"}, {"date": "2026-04-25", "first": "Lauro Goerck", "second": "Daniel Goerck", "third": "Lucas Goerck"}, {"date": "2026-05-09", "first": "Ilton Schwengber", "second": "Cicero Caliari", "third": "Jeferson Hermes"}, {"date": "2026-05-23", "first": "Cassiano Borges", "second": "Newton Bastos", "third": "Pedro Eidt"}, {"date": "2026-06-06", "first": "Jeferson Hermes", "second": "Daniel Goerck", "third": "Elio Schwengber"}]};
const PTS={first:10,second:7,third:5};
const MEDAL={first:'🥇',second:'🥈',third:'🥉'};
const POSLABEL={first:'1º',second:'2º',third:'3º'};
const KEY='rankingRaiz2026';

function load(){
  try{const s=localStorage.getItem(KEY);if(s)return JSON.parse(s);}catch(e){}
  return JSON.parse(JSON.stringify(SEED));
}
function save(d){try{localStorage.setItem(KEY,JSON.stringify(d));}catch(e){alert('Não foi possível salvar.');}}
let DATA=load();

function fmtDate(d){const[y,m,dd]=d.split('-');return dd+'/'+m+'/'+y;}
function computeRanking(){
  const t={};
  DATA.players.forEach(p=>t[p]=0);
  DATA.results.forEach(r=>{
    ['first','second','third'].forEach(k=>{
      if(r[k]){if(!(r[k] in t))t[r[k]]=0;t[r[k]]+=PTS[k];}
    });
  });
  return Object.entries(t).map(([name,pts])=>({name,pts}))
    .sort((a,b)=>b.pts-a.pts||a.name.localeCompare(b.name));
}

let activeTab='rank';
document.querySelectorAll('.tab').forEach(b=>b.onclick=()=>{
  activeTab=b.dataset.t;
  document.querySelectorAll('.tab').forEach(x=>x.classList.toggle('active',x===b));
  render();
});

function render(){
  const v=document.getElementById('view');
  if(activeTab==='rank')v.innerHTML=viewRank();
  else if(activeTab==='add'){v.innerHTML=viewAdd();bindAdd();}
  else if(activeTab==='hist')v.innerHTML=viewHist();
  else if(activeTab==='share'){v.innerHTML=viewShare();}
}

function viewRank(){
  const r=computeRanking().filter(x=>x.pts>0);
  let rows=r.map((x,i)=>{
    const pc=i<3?'p'+(i+1):'';
    const m=i<3?['🥇','🥈','🥉'][i]:'';
    return `<div class="row"><div class="pos ${pc}">${i+1}º</div><div class="nm">${x.name} <span class="medalemoji">${m}</span></div><div class="pts">${x.pts}</div></div>`;
  }).join('');
  if(!r.length)rows='<div class="empty">Nenhum resultado lançado ainda.</div>';
  return `<div class="card"><h2>Classificação geral</h2>${rows}</div>
  <div class="card"><div class="small">Pontuação: 1º lugar = 10 pts · 2º = 7 pts · 3º = 5 pts. ${DATA.results.length} etapa(s) realizadas.</div></div>`;
}

function viewAdd(){
  const opts=DATA.players.map(p=>`<option value="${p}">${p}</option>`).join('');
  return `<div class="card"><h2>Lançar resultado de uma data</h2>
    <label>Data da etapa</label><input type="date" id="d">
    <label>🥇 Campeão (1º lugar) — 10 pts</label><select id="f"><option value="">—</option>${opts}</select>
    <label>🥈 2º lugar — 7 pts</label><select id="s"><option value="">—</option>${opts}</select>
    <label>🥉 3º lugar — 5 pts</label><select id="t"><option value="">—</option>${opts}</select>
    <button class="btn" id="savebtn">Salvar resultado</button>
    <div class="small" style="margin-top:8px">Se a data já existir, ela será atualizada.</div>
  </div>
  <div class="card"><h2>Adicionar novo jogador</h2>
    <label>Nome</label><input type="text" id="np" placeholder="Nome do jogador">
    <button class="btn sec" id="addp">Adicionar jogador</button>
  </div>`;
}
function bindAdd(){
  document.getElementById('savebtn').onclick=()=>{
    const d=document.getElementById('d').value;
    const f=document.getElementById('f').value;
    const s=document.getElementById('s').value;
    const t=document.getElementById('t').value;
    if(!d){alert('Selecione a data.');return;}
    if(!f&&!s&&!t){alert('Selecione ao menos o campeão.');return;}
    const sel=[f,s,t].filter(Boolean);
    if(new Set(sel).size!==sel.length){alert('O mesmo jogador foi escolhido em mais de uma posição.');return;}
    const ex=DATA.results.find(r=>r.date===d);
    if(ex){ex.first=f;ex.second=s;ex.third=t;}
    else DATA.results.push({date:d,first:f,second:s,third:t});
    DATA.results.sort((a,b)=>a.date.localeCompare(b.date));
    save(DATA);activeTab='rank';
    document.querySelectorAll('.tab').forEach(x=>x.classList.toggle('active',x.dataset.t==='rank'));
    render();
  };
  document.getElementById('addp').onclick=()=>{
    const n=document.getElementById('np').value.trim();
    if(!n)return;
    if(DATA.players.includes(n)){alert('Jogador já existe.');return;}
    DATA.players.push(n);DATA.players.sort();save(DATA);render();
  };
}

function viewHist(){
  const rs=[...DATA.results].sort((a,b)=>b.date.localeCompare(a.date));
  if(!rs.length)return '<div class="card"><div class="empty">Nenhuma etapa lançada.</div></div>';
  return rs.map(r=>`<div class="card">
    <div class="datehdr"><span>📅 ${fmtDate(r.date)}</span><button class="del" data-d="${r.date}">remover</button></div>
    <div class="podium">🥇 <b>${r.first||'—'}</b></div>
    <div class="podium">🥈 ${r.second||'—'}</div>
    <div class="podium">🥉 ${r.third||'—'}</div>
  </div>`).join('')+`<div class="card"><h2>Backup dos dados</h2>
    <div class="small" style="margin-bottom:10px">Salve uma cópia dos seus lançamentos num arquivo. Útil ao trocar de celular ou se o navegador apagar os dados.</div>
    <button class="btn" id="export">⬇️ Exportar backup</button>
    <button class="btn sec" id="importbtn">⬆️ Importar backup</button>
    <input type="file" id="importfile" accept=".json,application/json" style="display:none">
    <button class="btn danger" id="reset" style="margin-top:18px">Restaurar dados originais</button>
  </div>`;
}

let shareLimit=0;
function shareCardHTML(){
  const r=computeRanking().filter(x=>x.pts>0);
  const total=r.length;
  const shown=shareLimit>0?r.slice(0,shareLimit):r;
  const last=DATA.results.length?fmtDate([...DATA.results].sort((a,b)=>b.date.localeCompare(a.date))[0].date):'';
  const rows=shown.map((x,i)=>{
    const m=i<3?['🥇','🥈','🥉'][i]:(i+1)+'º';
    return `<div class="sr"><div class="sp">${m}</div><div class="sn">${x.name}</div><div class="spt">${x.pts}</div></div>`;
  }).join('');
  const label=shareLimit>0&&shareLimit<total?`Top ${shareLimit}`:'Classificação geral';
  return `<div class="title">🏌️ Ranking Raiz 2026</div>
      <div class="sub">Atualizado em ${last||'—'}</div>
      ${rows||'<div style="text-align:center;opacity:.7">Sem resultados</div>'}
      <div class="foot">${label} · Clube de Golfe Raiz</div>`;
}
function renderShareCard(){document.getElementById('shareCard').innerHTML=shareCardHTML();}
function viewShare(){
  const total=computeRanking().filter(x=>x.pts>0).length;
  const opts=[['Todos',0],['Top 3',3],['Top 5',5],['Top 10',10]]
    .map(([t,v])=>`<option value="${v}"${v===shareLimit?' selected':''}>${t}</option>`).join('');
  return `<div class="card"><h2>Imagem para o WhatsApp</h2>
    <label>Quantos jogadores mostrar</label>
    <select id="shareLimit">${opts}</select>
    <div class="small" style="margin:4px 0 12px">${total} jogador(es) com pontuação no momento.</div>
    <div id="shareCard" class="shareimg">${shareCardHTML()}</div>
    <button class="btn" id="dl">📷 Gerar imagem (PNG)</button>
    <button class="btn sec" id="sh">📲 Compartilhar</button>
    <div class="small" style="margin-top:8px">No celular use "Compartilhar" para mandar direto no WhatsApp. No computador use "Gerar imagem".</div>
  </div>`;
}

async function makeCanvas(){
  return await html2canvas(document.getElementById('shareCard'),{scale:3,backgroundColor:null});
}

document.addEventListener('click',async e=>{
  if(e.target.id==='export'){
    const blob=new Blob([JSON.stringify(DATA,null,2)],{type:'application/json'});
    const dt=new Date().toISOString().slice(0,10);
    const a=document.createElement('a');a.download='ranking-raiz-backup-'+dt+'.json';
    a.href=URL.createObjectURL(blob);a.click();
  }
  if(e.target.id==='importbtn'){document.getElementById('importfile').click();}
  if(e.target.id==='reset'){
    if(confirm('Restaurar todos os dados originais da planilha? Isso apaga as alterações feitas no app.')){
      DATA=JSON.parse(JSON.stringify(SEED));save(DATA);render();
    }
  }
  if(e.target.classList&&e.target.classList.contains('del')){
    const d=e.target.dataset.d;
    if(confirm('Remover a etapa de '+fmtDate(d)+'?')){
      DATA.results=DATA.results.filter(r=>r.date!==d);save(DATA);render();
    }
  }
  if(e.target.id==='dl'){
    const c=await makeCanvas();
    const a=document.createElement('a');a.download='ranking-raiz-2026.png';a.href=c.toDataURL('image/png');a.click();
  }
  if(e.target.id==='sh'){
    const c=await makeCanvas();
    c.toBlob(async b=>{
      const file=new File([b],'ranking-raiz-2026.png',{type:'image/png'});
      if(navigator.canShare&&navigator.canShare({files:[file]})){
        try{await navigator.share({files:[file],title:'Ranking Raiz 2026'});}catch(err){}
      }else{
        const a=document.createElement('a');a.download='ranking-raiz-2026.png';a.href=c.toDataURL('image/png');a.click();
      }
    });
  }
});

document.addEventListener('change',e=>{
  if(e.target.id==='shareLimit'){
    shareLimit=parseInt(e.target.value,10)||0;
    renderShareCard();
  }
  if(e.target.id==='importfile'&&e.target.files.length){
    const reader=new FileReader();
    reader.onload=ev=>{
      try{
        const obj=JSON.parse(ev.target.result);
        if(!obj.players||!obj.results)throw new Error('formato');
        if(!confirm('Importar este backup? Os dados atuais serão substituídos.'))return;
        DATA=obj;save(DATA);render();
        alert('Backup importado com sucesso.');
      }catch(err){alert('Arquivo inválido. Use um backup exportado por este app.');}
    };
    reader.readAsText(e.target.files[0]);
    e.target.value='';
  }
});

render();
</script>
</body>
</html>
